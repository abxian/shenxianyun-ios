name: Build iOS (神仙云)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build SFI (unsigned)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode_16.app

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-gobuild-libbox-v1
          restore-keys: ${{ runner.os }}-gobuild-

      - name: Build Libbox.xcframework (from sing-box core)
        run: |
          set -e
          git clone --depth 1 https://github.com/SagerNet/sing-box.git core
          cd core
          make lib_install
          export PATH="$PATH:$(go env GOPATH)/bin"
          make lib_apple
          echo "--- 查找产物 Libbox.xcframework ---"
          FOUND=$(find "$PWD" "$(go env GOPATH)" "$HOME" -maxdepth 4 -name "Libbox.xcframework" -type d 2>/dev/null | head -1)
          echo "found: $FOUND"
          test -n "$FOUND"
          rm -rf "$GITHUB_WORKSPACE/Libbox.xcframework"
          cp -R "$FOUND" "$GITHUB_WORKSPACE/Libbox.xcframework"
          ls "$GITHUB_WORKSPACE/Libbox.xcframework"

      - name: List schemes
        run: xcodebuild -project sing-box.xcodeproj -list

      - name: Build SFI (device arm64, no signing)
        run: |
          xcodebuild \
            -project sing-box.xcodeproj \
            -scheme SFI \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build > /tmp/xb.log 2>&1 || true
          echo "================= 真实 error: 行 ================="
          grep -nE "error: " /tmp/xb.log | grep -vE "/usr/bin/|swiftc |clang |-D|\.modulevalidation" | head -60
          echo "================= 日志尾部 ================="
          tail -40 /tmp/xb.log
          grep -q "BUILD SUCCEEDED" /tmp/xb.log && echo "BUILD SUCCEEDED ✅" || { echo "BUILD FAILED"; exit 1; }
